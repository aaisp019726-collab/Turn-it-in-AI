<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turn-it-in-AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 { font-size: 2rem; font-weight: 800; color: #2b6cb0; }
    header p { color: #4a5568; margin-top: 0.5rem; }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      padding: 2rem;
      width: 100%;
      max-width: 720px;
    }
    label { display: block; font-weight: 600; margin-bottom: 0.4rem; }
    textarea {
      width: 100%;
      min-height: 200px;
      padding: 0.75rem;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.95rem;
      resize: vertical;
    }
    textarea:focus { outline: 2px solid #2b6cb0; border-color: transparent; }
    .btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.65rem 1.5rem;
      background: #2b6cb0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: #2c5282; }
    .flash { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; }
    .flash.error { background: #fff5f5; border: 1px solid #fc8181; color: #c53030; }
    .flash.success { background: #f0fff4; border: 1px solid #68d391; color: #276749; }
    footer { margin-top: 3rem; color: #718096; font-size: 0.85rem; }
  </style>
</head>
<body>
  <header>
    <h1>✏️ Turn-it-in-AI</h1>
    <p>Paste your assignment below — AI will complete it and submit it for you.</p>
  </header>

  <div class="card">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form action="/complete" method="post">
      <label for="assignment_text">Assignment / Question</label>
      <textarea
        id="assignment_text"
        name="assignment_text"
        placeholder="Paste your assignment text, questions, or instructions here…"
        required
      ></textarea>
      <button type="submit" class="btn">🤖 Complete with AI</button>
    </form>
  </div>

  <footer>Powered by OpenAI · Turn-it-in-AI</footer>
</body>
</html>
