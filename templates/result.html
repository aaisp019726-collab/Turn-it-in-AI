<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Result – Turn-it-in-AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 2rem; font-weight: 800; color: #2b6cb0; }
    header p { color: #4a5568; margin-top: 0.5rem; }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      padding: 2rem;
      width: 100%;
      max-width: 800px;
      margin-bottom: 1.5rem;
    }
    h2 { font-size: 1.1rem; color: #2d3748; margin-bottom: 0.75rem; }
    .original-text {
      background: #f7fafc;
      border-left: 4px solid #a0aec0;
      padding: 1rem;
      border-radius: 4px;
      white-space: pre-wrap;
      font-size: 0.9rem;
      color: #4a5568;
    }
    .completed-text {
      background: #ebf8ff;
      border-left: 4px solid #2b6cb0;
      padding: 1rem;
      border-radius: 4px;
      white-space: pre-wrap;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .submit-section h2 { margin-bottom: 1rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
    .tab-btn {
      padding: 0.45rem 1rem;
      border: 2px solid #2b6cb0;
      border-radius: 6px;
      background: #fff;
      color: #2b6cb0;
      font-weight: 600;
      cursor: pointer;
    }
    .tab-btn.active { background: #2b6cb0; color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    label { display: block; font-weight: 600; margin-bottom: 0.4rem; }
    input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
    }
    input:focus { outline: 2px solid #2b6cb0; border-color: transparent; }
    .btn {
      display: inline-block;
      padding: 0.65rem 1.5rem;
      background: #276749;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: #22543d; }
    .btn-secondary {
      background: #718096;
      margin-left: 0.5rem;
    }
    .btn-secondary:hover { background: #4a5568; }
    footer { margin-top: 3rem; color: #718096; font-size: 0.85rem; }
  </style>
</head>
<body>
  <header>
    <h1>✏️ Turn-it-in-AI</h1>
    <p>Review your completed assignment, then turn it in automatically.</p>
  </header>

  <!-- Original assignment -->
  <div class="card">
    <h2>📋 Original Assignment</h2>
    <div class="original-text">{{ assignment }}</div>
  </div>

  <!-- AI Completed answer -->
  <div class="card">
    <h2>🤖 AI-Completed Answer</h2>
    <div class="completed-text">{{ completed }}</div>
  </div>

  <!-- Turn-it-in section -->
  <div class="card submit-section">
    <h2>🚀 Turn It In</h2>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('canvas', this)">Canvas LMS</button>
      <button class="tab-btn" onclick="showTab('generic', this)">Custom URL</button>
    </div>

    <!-- Canvas tab -->
    <div id="tab-canvas" class="tab-content active">
      <form action="/submit" method="post">
        <input type="hidden" name="submission_type" value="canvas" />
        <input type="hidden" name="completed_text" value="{{ completed }}" />

        <label for="course_id">Canvas Course ID</label>
        <input type="text" id="course_id" name="course_id" placeholder="e.g. 12345" required />

        <label for="assignment_id">Canvas Assignment ID</label>
        <input type="text" id="assignment_id" name="assignment_id" placeholder="e.g. 67890" required />

        <button type="submit" class="btn">✅ Submit to Canvas</button>
        <a href="/" class="btn btn-secondary">← Start Over</a>
      </form>
    </div>

    <!-- Generic URL tab -->
    <div id="tab-generic" class="tab-content">
      <form action="/submit" method="post">
        <input type="hidden" name="submission_type" value="generic" />
        <input type="hidden" name="completed_text" value="{{ completed }}" />

        <label for="endpoint_url">Submission URL</label>
        <input type="text" id="endpoint_url" name="endpoint_url" placeholder="https://example.com/submit" required />

        <button type="submit" class="btn">✅ Submit</button>
        <a href="/" class="btn btn-secondary">← Start Over</a>
      </form>
    </div>
  </div>

  <footer>Powered by OpenAI · Turn-it-in-AI</footer>

  <script>
    function showTab(name, btn) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      btn.classList.add('active');
    }
  </script>
</body>
</html>
